<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Education App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #0f172a; /* slate-900 */
      color: #f1f5f9; /* slate-100 */
      overflow-x: hidden;
    }

    @keyframes successBounce {
      0%, 20%, 50%, 80%, 100% { transform: translateY(0) scale(1.02); }
      40% { transform: translateY(-15px) scale(1.02); }
      60% { transform: translateY(-7px) scale(1.02); }
    }
    .animate-success {
      animation: successBounce 1s ease;
      box-shadow: 0 0 30px rgba(16, 185, 129, 0.6) !important;
      outline-color: #10b981 !important; /* emerald-500 */
      background-color: #059669 !important; /* emerald-600 */
    }

    .wrong-cross::before, .wrong-cross::after {
      content: ''; position: absolute; top: 50%; left: 50%; width: 60%; height: 12px;
      background-color: rgba(239, 68, 68, 0.7); border-radius: 6px; transform-origin: center; z-index: 20;
    }
    .wrong-cross::before { transform: translate(-50%, -50%) rotate(45deg); }
    .wrong-cross::after { transform: translate(-50%, -50%) rotate(-45deg); }

    .wrong-ban::before {
      content: ''; position: absolute; top: 50%; left: 50%; width: 80px; height: 80px;
      border: 12px solid rgba(239, 68, 68, 0.7); border-radius: 50%; transform: translate(-50%, -50%); z-index: 20;
    }
    .wrong-ban::after {
      content: ''; position: absolute; top: 50%; left: 50%; width: 80px; height: 12px;
      background-color: rgba(239, 68, 68, 0.7); border-radius: 6px; transform: translate(-50%, -50%) rotate(-45deg); z-index: 20;
    }

    .wrong-question::before {
      content: '?'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 100px; font-weight: 800; color: rgba(239, 68, 68, 0.7); z-index: 20; line-height: 1;
    }

    .wrong-dash::before {
      content: ''; position: absolute; top: 50%; left: 50%; width: 60%; height: 12px;
      background-color: rgba(239, 68, 68, 0.7); border-radius: 6px; transform: translate(-50%, -50%); z-index: 20;
    }

    #toast-container {
      position: fixed; bottom: 2rem; right: 2rem; z-index: 1000;
      display: flex; flex-direction: column; gap: 0.75rem;
    }
    .toast {
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(51, 65, 85, 0.5);
      color: #f1f5f9;
      padding: 1rem 1.5rem;
      border-radius: 1rem;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
      display: flex; align-items: center; gap: 0.75rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      transform: translateX(100%); opacity: 0;
    }
    .toast.show { transform: translateX(0); opacity: 1; }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4">
  <header class="w-full max-w-4xl flex justify-between items-center mb-10 z-50">
    <div class="flex items-center gap-6">

        EduGaze

      <span id="display-user" class="text-sm font-medium text-slate-400 border-l border-slate-700 pl-6 h-5 flex items-center">
        Guest

        Edit Mode

  </header>

            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>

    <!-- Edit Board -->

      <div class="flex items-center justify-between mb-6 border-b border-slate-700 pb-4">

            <button id="btn-logout" class="text-[10px] uppercase tracking-widest font-bold text-slate-500 hover:text-red-400 transition-colors text-left flex items-center gap-1">
               <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
               Logout session

            <button id="btn-add-q" class="text-sm px-3 py-1.5 bg-emerald-600/20 text-emerald-400 rounded hover:bg-emerald-600/30 transition-colors">+ New Question</button>

            <input type="range" id="input-dwell-slider" min="0" max="6000" step="100" class="flex-1 h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-500">
            <button id="btn-apply-all-dwell" class="whitespace-nowrap text-xs px-3 py-2 bg-slate-700 hover:bg-slate-600 text-slate-300 rounded border border-slate-600 transition-colors">Apply to all</button>
          </div>
          <p class="text-sm text-slate-500 mt-2">How long the mouse must stay over an answer to select it. (0-6000ms)</p>
        </div>
      </div>
    </div>
  </main>

  <div id="login-overlay" class="fixed inset-0 bg-slate-950 flex flex-col items-center justify-center z-[100] transition-opacity duration-500">
    <div class="text-center space-y-8 p-10 bg-slate-900 rounded-3xl shadow-2xl border border-slate-800 max-w-md w-full mx-4">
      <div class="inline-flex p-4 rounded-2xl bg-blue-500/10 text-blue-400 mb-2">
        <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>
      </div>
      <h1 class="text-4xl font-extrabold text-white tracking-tight">EduGaze</h1>
      <p class="text-slate-400 text-lg">Interactive Learning Platform</p>
      <button id="btn-login" class="w-full flex items-center justify-center gap-4 bg-white hover:bg-slate-100 text-slate-900 font-bold py-4 px-6 rounded-xl transition-all transform hover:scale-[1.02] active:scale-95 shadow-xl">
        <svg class="w-6 h-6" viewBox="0 0 24 24">
           <path fill="#EA4335" d="M12 5.04c1.94 0 3.51.66 4.88 1.96l3.66-3.66C18.23 1.33 15.39 0 12 0 7.31 0 3.26 2.69 1.18 6.64l4.13 3.2c.98-2.94 3.73-5.04 6.69-5.04z" />
           <path fill="#4285F4" d="M23.49 12.27c0-.83-.07-1.63-.2-2.4H12v4.54h6.44c-.28 1.48-1.11 2.73-2.37 3.57l3.71 2.89c2.17-2 3.71-5.23 3.71-8.6z" />
           <path fill="#FBBC05" d="M5.31 14.36c-.25-.75-.4-1.55-.4-2.36s.15-1.61.4-2.36L1.18 6.64C.43 8.16 0 10.01 0 12s.43 3.84 1.18 5.36l4.13-3z" />
           <path fill="#34A853" d="M12 24c3.24 0 5.96-1.07 7.95-2.9l-3.71-2.89c-1.1.74-2.5 1.17-4.24 1.17-3.26 0-6.02-2.2-7.01-5.16L1.18 17.36C3.26 21.31 7.31 24 12 24z" />
        </svg>
        Sign in with Google

      <div class="flex items-center gap-4 my-2">

    </div>
  </div>

  <div id="toast-container"></div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js';
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js';
    import { getFirestore, doc, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js';

    // Firebase configuration
    const firebaseConfig = {
      projectId: "edugaze-50cdb",
      appId: "1:775011941712:web:eb8d401324ee83ba4b8055",
      storageBucket: "edugaze-50cdb.firebasestorage.app",
      apiKey: "AIzaSyACPuElfTu3s76-usOgs9j6dmPma2H9tfc",
      authDomain: "edugaze-50cdb.firebaseapp.com",
      messagingSenderId: "775011941712",
      measurementId: "G-3P6WCE7QPP"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const googleProvider = new GoogleAuthProvider();

    const STORAGE_KEY = 'eduApp_data_v2';
    const initData = () => ({
      id: Date.now().toString(),
      question: 'What is the capital of France?',
      rows: 2, cols: 2,
      selectionType: 'single',
      dwellTimeMs: 2000,
      maximizeSpacing: false,
      answers: [
        { id: '1', text: 'London' }, { id: '2', text: 'Berlin' },
        { id: '3', text: 'Paris' }, { id: '4', text: 'Madrid' }
      ],
      correctAnswerIds: ['3'],
      correctAnswerId: '3'
    });

    let appData = { dwellTimeMs: 2000, questions: [initData()] };
    let user = null;
    let isInitialLoadComplete = false;

    async function loadDataFromFirestore() {
       if (!user) return;
       // Skip if Guest - but ensure isInitialLoadComplete is true
       if (user.isGuest) {
          const stored = localStorage.getItem(STORAGE_KEY);
          if (stored) {
             appData = JSON.parse(stored);
          }
          isInitialLoadComplete = true;
          return;
       }
       try {
           console.log("Attempting to load data from Firestore...");
           const docRef = doc(db, "configs", "main");
           const docSnap = await getDoc(docRef);
           
           if (docSnap.exists()) {
               console.log("Data loaded from Firestore successfully.");
               const cloudData = docSnap.data();
               
               // Migration: Ensure all questions have dwellTimeMs
               const globalDwell = cloudData.dwellTimeMs || 2000;
               cloudData.questions.forEach(q => {
                  if (q.dwellTimeMs === undefined) q.dwellTimeMs = globalDwell;
               });
               appData = cloudData;
           } else {
               console.log("No data found in Firestore. Migrating from local storage or using defaults.");
               const stored = localStorage.getItem(STORAGE_KEY);
               if (stored) {
                  appData = JSON.parse(stored);
               } else {
                  appData = { dwellTimeMs: 2000, questions: [initData()] };
               }
               await saveDataToFirestore();
           }
           isInitialLoadComplete = true;
       } catch (error) {
           console.error("Error loading data from Firestore:", error);
           // Even if error, allow editing with what we have
           isInitialLoadComplete = true;
       }
    }

    let saveTimer = null;
    async function saveDataToFirestore() {
       if (!user || !isInitialLoadComplete) {
          console.log("Skipping save: User not signed in or initial load in progress.");
          return;
       }
       localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
       if (user.isGuest) return; // Only local save for guest
       
       try {
           console.log("Saving data to Firestore...");
           const docRef = doc(db, "configs", "main");
           await setDoc(docRef, appData);
           console.log("Data saved successfully.");
       } catch (error) {
           console.error("Error saving data to Firestore:", error);
       }
    }

    // Proxy with debounce for original saveData
    function saveData() { 
       if (!isInitialLoadComplete) return;
       if (saveTimer) clearTimeout(saveTimer);
       saveTimer = setTimeout(() => {
          saveDataToFirestore(); 
       }, 500);
    }

    let currentQuestionIndex = 0;
    const getActiveQ = () => {
        const q = appData.questions[currentQuestionIndex];
        if (!q.selectionType) q.selectionType = 'single';
        if (!q.correctAnswerIds) {
           q.correctAnswerIds = q.correctAnswerId ? [q.correctAnswerId] : [];
        }
        return q;
    };

    const toastContainer = document.getElementById('toast-container');
    function showToast(message, type = 'success') {
       const toast = document.createElement('div');
       toast.className = 'toast';
       const icon = type === 'success' 
          ? '<svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>'
          : '<svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>';
       
       toast.innerHTML = `${icon} <span class="text-sm font-medium">${message}</span>`;
       toastContainer.appendChild(toast);
       
       // Trigger animation
       requestAnimationFrame(() => toast.classList.add('show'));
       
       // Remove after duration
       setTimeout(() => {
          toast.classList.remove('show');
          setTimeout(() => toast.remove(), 300);
       }, 3000);
    }

    let mode = 'education'; // 'education' or 'edit'
    let selectedId = null;
    let wrongSelectionsCount = {};
    let renderGen = 0;

    const btnEducation = document.getElementById('btn-education');
    const btnEdit = document.getElementById('btn-edit');
    const viewEducation = document.getElementById('view-education');
    const viewEdit = document.getElementById('view-edit');
    const displayQuestion = document.getElementById('display-question');
    const answersGrid = document.getElementById('answers-grid');

    const inputQuestion = document.getElementById('input-question');
    const inputDwell = document.getElementById('input-dwell');
    const inputLayout = document.getElementById('input-layout');
    const inputSelectionType = document.getElementById('input-selection-type');
    const editAnswersContainer = document.getElementById('edit-answers-container');
    const inputDwellSlider = document.getElementById('input-dwell-slider');
    const btnApplyAllDwell = document.getElementById('btn-apply-all-dwell');
    const inputMaxSpacing = document.getElementById('input-max-spacing');
    
    const btnPrevEdu = document.getElementById('btn-prev-edu');
    const btnNextEdu = document.getElementById('btn-next-edu');
    const btnPrevEdit = document.getElementById('btn-prev-edit');
    const btnNextEdit = document.getElementById('btn-next-edit');
    const displayQCount = document.getElementById('display-q-count');
    const btnAddQ = document.getElementById('btn-add-q');
    const btnDeleteQ = document.getElementById('btn-delete-q');
    const loginOverlay = document.getElementById('login-overlay');
    const btnLogin = document.getElementById('btn-login');
    const btnGuest = document.getElementById('btn-guest');

    const btnLogout = document.getElementById('btn-logout');
    btnLogout.onclick = async () => {
       if (user && !user.isGuest) {
          await signOut(auth);
       }
       // Reset local state regardless of Guest or Google
       user = null;
       appData = { dwellTimeMs: 2000, questions: [initData()] }; // Reset to defaults
       currentQuestionIndex = 0;
       isInitialLoadComplete = false;
       setMode('education');
       displayUser.textContent = "Guest";
       loginOverlay.classList.remove('hidden');
       setTimeout(() => loginOverlay.classList.remove('opacity-0'), 10);
       showToast("Logged out successfully.");
    };

    btnGuest.onclick = () => {
       user = { isGuest: true, displayName: "Guest User" };
       displayUser.textContent = "Guest";
       loginOverlay.classList.add('opacity-0');
       setTimeout(() => loginOverlay.classList.add('hidden'), 500);
       loadDataFromFirestore().then(() => {
          renderEducationBoard();
       });
    };
    
    // Auth events
    btnLogin.onclick = async () => {
       try {
          await signInWithPopup(auth, googleProvider);
       } catch (err) {
          console.error("Login failed", err);
          showToast("Login failed: " + err.message, "error");
       }
    };

    const displayUser = document.getElementById('display-user');
     onAuthStateChanged(auth, async (u) => {
        if (u) {
           user = u;
           loginOverlay.classList.add('opacity-0');
           setTimeout(() => loginOverlay.classList.add('hidden'), 500);
           displayUser.textContent = user.email || user.displayName || "User";
           await loadDataFromFirestore();
           renderEducationBoard();
        } else {
           // If we're already a Guest, don't revert to login screen automatically
           if (user && user.isGuest) return;

           user = null;
           displayUser.textContent = "Guest";
           loginOverlay.classList.remove('hidden');
           setTimeout(() => loginOverlay.classList.remove('opacity-0'), 10);
        }
     });

    function playSuccessSound() {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523.25, ctx.currentTime); // C5
        osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1); // E5
        osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.2); // G5
        osc.frequency.setValueAtTime(1046.50, ctx.currentTime + 0.3); // C6
        
        gain.gain.setValueAtTime(0, ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + 0.05);
        gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.5);
        
        osc.connect(gain);
        gain.connect(ctx.destination);
        
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.6);
      } catch(e) {
        console.error("Audio playback error", e);
      }
    }

    function playWrongSound() {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        
        const osc1 = ctx.createOscillator();
        const osc2 = ctx.createOscillator();
        const gain = ctx.createGain();
        
        osc1.type = 'sawtooth';
        osc1.frequency.setValueAtTime(120, ctx.currentTime);
        
        osc2.type = 'square';
        osc2.frequency.setValueAtTime(126, ctx.currentTime);
        
        gain.gain.setValueAtTime(0, ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0.15, ctx.currentTime + 0.02);
        gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
        
        osc1.connect(gain);
        osc2.connect(gain);
        gain.connect(ctx.destination);
        
        osc1.start(ctx.currentTime);
        osc2.start(ctx.currentTime);
        osc1.stop(ctx.currentTime + 0.3);
        osc2.stop(ctx.currentTime + 0.3);
      } catch(e) {
        console.error("Audio playback error", e);
      }
    }

    function resizeImageFileToDataURL(file, maxSize = 400) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
             const canvas = document.createElement('canvas');
             let w = img.width;
             let h = img.height;
             if (w > maxSize || h > maxSize) {
                if (w > h) { h = (h / w) * maxSize; w = maxSize; }
                else { w = (w / h) * maxSize; h = maxSize; }
             }
             canvas.width = w; canvas.height = h;
             const ctx = canvas.getContext('2d');
             ctx.drawImage(img, 0, 0, w, h);
             resolve(canvas.toDataURL('image/jpeg', 0.8));
          };
          img.onerror = reject;
          img.src = e.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // Switch modes
    function setMode(newMode) {
      if (newMode === 'edit' && !user) {
         showToast("You must be signed in to edit.", "error");
         return;
      }
      mode = newMode;
      if (mode === 'education') {
        btnEducation.className = "flex items-center gap-2 px-4 py-2 rounded-lg transition-all bg-blue-600 text-white shadow-lg shadow-blue-500/30";
        btnEdit.className = "flex items-center gap-2 px-4 py-2 rounded-lg transition-all bg-slate-800 text-slate-400 hover:bg-slate-700";
        viewEducation.classList.remove('hidden');
        viewEdit.classList.add('hidden');
        selectedId = null; // Reset selection on mode change
        wrongSelectionsCount = {};
        renderEducationBoard();
      } else {
        btnEdit.className = "flex items-center gap-2 px-4 py-2 rounded-lg transition-all bg-emerald-600 text-white shadow-lg shadow-emerald-500/30";
        btnEducation.className = "flex items-center gap-2 px-4 py-2 rounded-lg transition-all bg-slate-800 text-slate-400 hover:bg-slate-700";
        viewEdit.classList.remove('hidden');
        viewEducation.classList.add('hidden');
        renderEditBoard();
      }
    }

    // Logo refresh feature
    document.getElementById('logo').onclick = () => {
       if (mode === 'education') renderEducationBoard();
       else renderEditBoard();
    };

    btnEducation.onclick = () => setMode('education');
    btnEdit.ondblclick = () => setMode('edit');
    
    // Alert user about double click on the first try if they single click
    btnEdit.onclick = () => {
       if (mode !== 'edit') {
           console.log("Double click required to enter Edit Mode");
       }
    };

    btnPrevEdu.addEventListener('dblclick', () => {
       if (currentQuestionIndex > 0) {
          currentQuestionIndex--;
          selectedId = null; wrongSelectionsCount = {};
          renderEducationBoard();
       }
    });

    btnNextEdu.addEventListener('dblclick', () => {
       if (currentQuestionIndex < appData.questions.length - 1) {
          currentQuestionIndex++;
          selectedId = null; wrongSelectionsCount = {};
          renderEducationBoard();
       }
    });

    // Edit nav
    btnPrevEdit.addEventListener('click', () => {
       if (currentQuestionIndex > 0) {
          currentQuestionIndex--;
          renderEditBoard();
       }
    });
    btnNextEdit.addEventListener('click', () => {
       if (currentQuestionIndex < appData.questions.length - 1) {
          currentQuestionIndex++;
          renderEditBoard();
       }
    });
     btnAddQ.addEventListener('click', () => {
        const limit = (user && user.isGuest) ? 50 : 100;
        if (appData.questions.length >= limit) {
           showToast(`Limit reached: ${limit} questions max for ${user.isGuest ? 'Guest' : 'Pro'} accounts.`, 'error');
           return;
        }
        appData.questions.push(initData());
        currentQuestionIndex = appData.questions.length - 1;
        saveData();
        renderEditBoard();
     });
    btnDeleteQ.addEventListener('click', () => {
       if (appData.questions.length > 1) {
          appData.questions.splice(currentQuestionIndex, 1);
          if (currentQuestionIndex >= appData.questions.length) {
             currentQuestionIndex = appData.questions.length - 1;
          }
          saveData();
          renderEditBoard();
       }
    });

    const displayQCountEdu = document.getElementById('display-q-count-edu');
    function renderEducationBoard() {
        renderGen++;
        const currentGen = renderGen;
         const q = getActiveQ();
         displayQuestion.textContent = q.question;
         displayQCountEdu.textContent = `Question ${currentQuestionIndex + 1} of ${appData.questions.length}`;
         
         btnPrevEdu.disabled = currentQuestionIndex === 0;
         btnNextEdu.disabled = currentQuestionIndex === appData.questions.length - 1;
       
       const colClass = getActiveQ().cols === 3 ? 'sm:grid-cols-3' : 'sm:grid-cols-2';
       const gapClass = getActiveQ().maximizeSpacing ? 'gap-16 sm:gap-24' : 'gap-6';
       
       // Ensure one-page visibility
       answersGrid.className = `grid grid-cols-1 ${colClass} ${gapClass} w-full max-w-5xl flex-1 min-h-0 py-4`;
       answersGrid.innerHTML = '';
      getActiveQ().answers.forEach(answer => {
        const isSelected = selectedId === answer.id;
        const isCorrect = getActiveQ().correctAnswerIds.includes(answer.id);
        
        const card = document.createElement('div');
        let hClass = "h-56";
        if (getActiveQ().rows === 3) hClass = "h-32";
        else if (getActiveQ().rows === 2 && getActiveQ().cols === 3) hClass = "h-40";
        else if (getActiveQ().rows === 1) hClass = "h-64";
        
        let basePin = answer.image ? 'p-0' : 'p-6';
        let baseClasses = `relative overflow-hidden rounded-2xl ${basePin} ${hClass} flex items-center justify-center cursor-pointer transition-all duration-300 transform outline outline-2 outline-offset-4 select-none `;
        
        if (isSelected) {
          if (isCorrect) {
            baseClasses += "text-white animate-success ";
          } else {
             // Selected but wrong
             const count = wrongSelectionsCount[answer.id] || 1;
             let symbolClass = "wrong-cross";
             if (count % 4 === 2) symbolClass = "wrong-ban";
             else if (count % 4 === 3) symbolClass = "wrong-question";
             else if (count % 4 === 0) symbolClass = "wrong-dash";
             
             baseClasses += `bg-slate-700 outline-red-500/50 ${symbolClass} text-slate-300 `;
          }
        } else {
          baseClasses += "bg-slate-800 outline-transparent hover:bg-slate-700 hover:shadow-xl ";
        }
        
        card.className = baseClasses;

        const innerContainer = document.createElement('div');
        innerContainer.className = 'flex flex-col items-center justify-center gap-3 w-full h-full z-10 pointer-events-none' + (answer.image ? '' : ' p-2');
        
        let textClass = 'text-3xl font-semibold text-center transition-colors ';
        if (answer.image) {
            const imgEl = document.createElement('img');
            imgEl.src = answer.image;
            imgEl.className = 'absolute inset-0 w-full h-full object-cover transition-opacity z-0 ';
            if (isSelected) {
               imgEl.classList.add(isCorrect ? 'opacity-100' : 'opacity-40');
            }
            card.appendChild(imgEl);
            
            textClass = 'text-xl md:text-2xl font-bold text-center transition-colors drop-shadow-md py-2 px-3 block w-full bg-slate-900/80 backdrop-blur-sm shadow-xl mt-auto ';
            innerContainer.className = 'absolute inset-0 flex flex-col items-center justify-end w-full h-full z-10 pointer-events-none';
        }
        
        const textSpan = document.createElement('span');
        textSpan.className = textClass + (isSelected ? (isCorrect ? 'text-white' : 'text-slate-100 opacity-50') : 'text-slate-100');
        textSpan.textContent = answer.text;
        
        if (answer.text.trim().length > 0) {
            innerContainer.appendChild(textSpan);
        }
        
        card.appendChild(innerContainer);

        const allowDwell = !isSelected || (isSelected && !isCorrect);
        if (allowDwell) {
          // Progress bar base
          const progressBar = document.createElement('div');
          progressBar.className = "absolute bottom-0 left-0 h-1.5 bg-blue-500/30 transition-none z-10";
          progressBar.style.width = "0%";
          card.appendChild(progressBar);

          // SVG Overlay definition
          let timer = null;
          let svgOverlay = null;

          const removeOverlay = () => {
             if (svgOverlay && svgOverlay.parentNode === card) {
                 card.removeChild(svgOverlay);
                 svgOverlay = null;
             }
          };

          const addOverlay = () => {
             if (!svgOverlay) {
                 svgOverlay = document.createElement('div');
                 // Made background transparent and removed backdrop blur
                 svgOverlay.className = "absolute inset-0 flex items-center justify-center z-20 pointer-events-none";
                 svgOverlay.innerHTML = `<svg class="w-32 h-32 transform -rotate-90">
                       <circle cx="64" cy="64" r="48" class="text-slate-700/80" stroke-width="8" stroke="currentColor" fill="transparent" />
                       <circle cx="64" cy="64" r="48" class="text-orange-400 drop-shadow-md progress-circle" style="opacity: 0.5" stroke-width="8" stroke-dasharray="301.59" stroke-dashoffset="301.59" stroke-linecap="round" stroke="currentColor" fill="transparent" />
                    </svg>`;
                 card.appendChild(svgOverlay);
             }
          };

          const doSelect = () => {
             selectedId = answer.id;
             if (getActiveQ().correctAnswerIds.includes(answer.id)) {
                playSuccessSound();
             } else {
                playWrongSound();
                wrongSelectionsCount[answer.id] = (wrongSelectionsCount[answer.id] || 0) + 1;
             }
             renderEducationBoard();
          };

          const startDwell = () => {
            let start = null;
            
            const animate = (time) => {
              if (currentGen !== renderGen) return; // Prevent ghost timers
              if (start === null) start = time;
              const elapsed = time - start;
              const progress = Math.min((elapsed / getActiveQ().dwellTimeMs) * 100, 100);
              
              progressBar.style.width = `${progress}%`;
              if (progress > 0) {
                 addOverlay();
                 const circle = svgOverlay.querySelector('.progress-circle');
                 if (circle) {
                    const circumference = 48 * 2 * Math.PI;
                    const offset = circumference - (progress / 100) * circumference;
                    circle.style.strokeDashoffset = offset;
                 }
              }

              if (progress >= 100) {
                doSelect();
              } else {
                timer = requestAnimationFrame(animate);
              }
            };
            timer = requestAnimationFrame(animate);
          };

          const stopDwell = () => {
            if (timer) cancelAnimationFrame(timer);
            progressBar.style.width = "0%";
            removeOverlay();
          };

          card.addEventListener('mouseenter', startDwell);
          card.addEventListener('mouseleave', stopDwell);
          card.addEventListener('click', doSelect);
          
          // touch support
          card.addEventListener('touchstart', (e) => { e.preventDefault(); startDwell() });
          card.addEventListener('touchend', (e) => { e.preventDefault(); stopDwell(); doSelect(); });
          card.addEventListener('touchcancel', (e) => { e.preventDefault(); stopDwell() });
        }

        answersGrid.appendChild(card);
      });
    }

    function renderEditBoard() {
      const q = getActiveQ();
      
      displayQCount.textContent = `${currentQuestionIndex + 1} / ${appData.questions.length}`;
      btnPrevEdit.disabled = currentQuestionIndex === 0;
      btnNextEdit.disabled = currentQuestionIndex === appData.questions.length - 1;
      
      inputQuestion.value = q.question;
      inputDwell.value = q.dwellTimeMs;
      inputDwellSlider.value = q.dwellTimeMs;
      inputMaxSpacing.checked = !!q.maximizeSpacing;
      inputLayout.value = `${q.rows}x${q.cols}`;
      inputSelectionType.value = q.selectionType;
      
      // Update Delete button visibility
      if (appData.questions.length > 1) {
         btnDeleteQ.classList.remove('hidden');
      } else {
         btnDeleteQ.classList.add('hidden');
      }
      
      inputQuestion.oninput = (e) => { q.question = e.target.value; saveData(); };
      inputMaxSpacing.onchange = (e) => { q.maximizeSpacing = e.target.checked; saveData(); };
      
      const syncDwell = (val) => {
         q.dwellTimeMs = Number(val);
         inputDwell.value = val;
         inputDwellSlider.value = val;
         saveData();
      };
      
      inputDwell.oninput = (e) => syncDwell(e.target.value);
      inputDwellSlider.oninput = (e) => syncDwell(e.target.value);
      
      btnApplyAllDwell.onclick = () => {
         const currentDwell = q.dwellTimeMs;
         appData.questions.forEach(question => {
            question.dwellTimeMs = currentDwell;
         });
         saveData();
         showToast(`Applied ${currentDwell}ms dwell time to all ${appData.questions.length} questions!`);
      };

      inputSelectionType.onchange = (e) => {
         q.selectionType = e.target.value;
         if (q.selectionType === 'single' && q.correctAnswerIds.length > 1) {
            q.correctAnswerIds = [q.correctAnswerIds[0]];
            q.correctAnswerId = q.correctAnswerIds[0];
         }
         saveData();
         renderEditBoard();
      };
      inputLayout.onchange = (e) => {
         const [r, c] = e.target.value.split('x').map(Number);
         q.rows = r;
         q.cols = c;
         const total = r * c;
         while(q.answers.length < total) {
            q.answers.push({ id: Date.now().toString() + Math.random(), text: 'New Answer' });
         }
         if(q.answers.length > total) {
            q.answers = q.answers.slice(0, total);
         }
         // Ensure correctAnswerId is valid if we truncated it
         q.correctAnswerIds = q.correctAnswerIds.filter(id => q.answers.find(a => a.id === id));
         if (q.selectionType === 'single' && q.correctAnswerIds.length === 0 && q.answers.length > 0) {
            q.correctAnswerIds = [q.answers[0].id];
         }
         q.correctAnswerId = q.correctAnswerIds[0] || '';
         saveData();
         renderEditBoard();
      };

      editAnswersContainer.innerHTML = '';
      q.answers.forEach((answer, index) => {
        const div = document.createElement('div');
        div.className = "flex flex-col gap-2 p-4 bg-slate-900 border border-slate-700 rounded-lg relative overflow-hidden";
        
        const isCorrect = q.correctAnswerIds.includes(answer.id);
        const inputType = q.selectionType === 'multi' ? 'checkbox' : 'radio';
        
        div.innerHTML = `
          <div class="flex items-center justify-between mb-1">
             <label class="text-sm font-medium text-slate-400">Answer ${index + 1}</label>
             <label class="flex items-center gap-2 text-sm text-emerald-400 cursor-pointer">
                <input type="${inputType}" name="correctAnswer" value="${answer.id}" ${isCorrect ? 'checked' : ''} class="w-4 h-4 text-emerald-500 bg-slate-800 border-slate-600 focus:ring-emerald-500 focus:ring-offset-slate-900">
                Correct
             </label>
          </div>
          <input type="text" value="${answer.text}" placeholder="Answer wording..." class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-slate-100 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/50 transition-all">
          <div class="flex items-center gap-3 mt-1">
             <button class="btn-upload text-xs px-3 py-1.5 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded border border-slate-600 transition-colors">
                ${answer.image ? 'Change Image' : 'Add Image'}
             </button>
             <input type="file" accept="image/*" class="file-input hidden">
             ${answer.image ? `
                <img src="${answer.image}" class="h-8 w-8 object-cover rounded shadow-sm border border-slate-600">
                <button class="btn-remove-img text-xs text-red-400 hover:text-red-300 ml-auto">Remove</button>
             ` : ''}
          </div>
        `;
        
        const textInput = div.querySelector('input[type="text"]');
        textInput.oninput = (e) => { answer.text = e.target.value; saveData(); };
        
        const fileInput = div.querySelector('.file-input');
        const btnUpload = div.querySelector('.btn-upload');
        const btnRemove = div.querySelector('.btn-remove-img');
        
        btnUpload.onclick = () => fileInput.click();
        
        fileInput.onchange = async (e) => {
           const file = e.target.files?.[0];
           if (!file) return;
           try {
              btnUpload.textContent = "Processing...";
              const dataUrl = await resizeImageFileToDataURL(file, 400);
              answer.image = dataUrl;
              saveData();
              renderEditBoard();
           } catch(err) {
              console.error(err);
              showToast("Failed to read image", "error");
              btnUpload.textContent = "Try Again";
           }
        };

        if (btnRemove) {
           btnRemove.onclick = () => {
              delete answer.image;
              saveData();
              renderEditBoard();
           };
        }

        const checkRadioInput = div.querySelector(`input[type="${inputType}"]`);
        checkRadioInput.onchange = (e) => {
           if (q.selectionType === 'multi') {
              if (e.target.checked) {
                 if(!q.correctAnswerIds.includes(e.target.value)) q.correctAnswerIds.push(e.target.value);
              } else {
                 q.correctAnswerIds = q.correctAnswerIds.filter(id => id !== e.target.value);
              }
           } else {
              if(e.target.checked) { 
                 q.correctAnswerIds = [e.target.value];
                 q.correctAnswerId = e.target.value;
              }
           }
           saveData();
        }

        editAnswersContainer.appendChild(div);
      });
    }

    // Export for debugging if needed
    window.logout = () => signOut(auth);
  </script>
</body>
</html>
